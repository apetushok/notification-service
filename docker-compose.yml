services:
  # ============================================
  # PHP-FPM Worker (Consumer)
  # ============================================
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: notification-app
    restart: unless-stopped
    volumes:
      - ./src:/var/www
      - ./.docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=notifications
      - DB_USERNAME=notify_user
      - DB_PASSWORD=${DB_PASSWORD}
      - KAFKA_BROKERS=kafka1:9092,kafka2:9094,kafka3:9096
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka1:
        condition: service_healthy
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Nginx
  # ============================================
  nginx:
    build:
      context: .
      dockerfile: .docker/nginx/Dockerfile
    container_name: notification-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
    tmpfs:
      - /var/run
    depends_on:
      - app
    networks:
      - notification-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: notification-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=notify_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_REPLICATION_PASSWORD=${DB_REPLICATION_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./.docker/postgres/init-master.sh:/docker-entrypoint-initdb.d/01-init-master.sh
    ports:
      - "5432:5432"
    command: |
      postgres
      -c wal_level=logical
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=6553kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notify_user -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ============================================
  # PostgreSQL Replica (Hot Standby)
  # ============================================
  postgres-replica:
    image: postgres:16-alpine
    container_name: notification-postgres-replica
    restart: unless-stopped
    environment:
      - POSTGRES_DB=notifications
      - POSTGRES_USER=notify_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - DB_REPLICATION_PASSWORD=${DB_REPLICATION_PASSWORD}
      - REPLICATION_PASSWORD=${DB_REPLICATION_PASSWORD}
      - MASTER_HOST=postgres
      - REPLICATION_USER=replicator
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
      - ./.docker/postgres/init-replica.sh:/docker-entrypoint-initdb.d/init-replica.sh
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notify_user -d notifications" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - notification-network

  # ============================================
  # PgBouncer (Connection Pooler)
  # ============================================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: notification-pgbouncer
    restart: unless-stopped
    environment:
      - DB_USER=notify_user
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=notifications
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - RESERVE_POOL_SIZE=10
      - ADMIN_USERS=notify_user,postgres
    ports:
      - "6432:5432"
    depends_on:
      - postgres
      - postgres-replica
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # Debezium UI (мониторинг)
  # ============================================
  debezium-ui:
    image: debezium/debezium-ui:2.5
    container_name: notification-kafka-connect-ui
    restart: unless-stopped
    ports:
      - "8084:8080"
    environment:
      KAFKA_CONNECT_URIS: http://kafka-connect:8083
    depends_on:
      - kafka-connect
    networks:
      - notification-network

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: notification-redis
    restart: unless-stopped
    command: |
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ============================================
  # Kafka
  # ============================================
  kafka1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: notification-kafka1
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:9093,2@kafka2:9095,3@kafka3:9097'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka1:9092,CONTROLLER://kafka1:9093'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka1:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_COMPRESSION_TYPE: lz4
      CLUSTER_ID: 'rFYq4HkbRryjzqgn4UQ9Jw'
    volumes:
      - kafka1-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka1:9092" ]
      interval: 10s
      timeout: 10s
      retries: 10    # Было 5, увеличиваем до 10
      start_period: 60s  # Добавить начальный период ожидания
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G

  kafka2:
    image: confluentinc/cp-kafka:7.6.0
    container_name: notification-kafka2
    restart: unless-stopped
    ports:
      - "9094:9094"
      - "9095:9095"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:9093,2@kafka2:9095,3@kafka3:9097'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka2:9094,CONTROLLER://kafka2:9095'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka2:9094'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_COMPRESSION_TYPE: lz4
      CLUSTER_ID: 'rFYq4HkbRryjzqgn4UQ9Jw'
    volumes:
      - kafka2-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka2:9094" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G

  kafka3:
    image: confluentinc/cp-kafka:7.6.0
    container_name: notification-kafka3
    restart: unless-stopped
    ports:
      - "9096:9096"
      - "9097:9097"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: 'controller,broker'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:9093,2@kafka2:9095,3@kafka3:9097'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka3:9096,CONTROLLER://kafka3:9097'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka3:9096'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_COMPRESSION_TYPE: lz4
      CLUSTER_ID: 'rFYq4HkbRryjzqgn4UQ9Jw'
    volumes:
      - kafka3-data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka3:9096" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1.5G

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.6.0
    container_name: notification-kafka-connect
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: kafka1:9092,kafka2:9094,kafka3:9096
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_REST_PORT: 8083
      CONNECT_GROUP_ID: notification-connect-cluster
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 3
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
      CONNECT_LOG4J_LOGGERS: org.apache.kafka.connect.runtime.rest=WARN,org.reflections=ERROR
      CONNECT_OFFSET_FLUSH_INTERVAL_MS: 10000
      CONNECT_OFFSET_FLUSH_TIMEOUT_MS: 5000
    volumes:
      - kafka-connect-data:/var/lib/kafka-connect/data
      - ./.docker/kafka-connect/plugins/debezium-connector-postgres:/usr/share/confluent-hub-components/debezium-connector-postgres
    depends_on:
      kafka1:
        condition: service_healthy
      kafka2:
        condition: service_healthy
      kafka3:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8083/" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - notification-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # ============================================
  # Kafka UI
  # ============================================
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: notification-kafka-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: notification-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:9092,kafka2:9094,kafka3:9096
    depends_on:
      - kafka1
      - kafka2
      - kafka3
    networks:
      - notification-network

networks:
  notification-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
    driver: local
  postgres-replica-data:
    driver: local
  redis-data:
    driver: local
  kafka1-data:
    driver: local
  kafka2-data:
    driver: local
  kafka3-data:
    driver: local
  kafka-connect-data:
    driver: local
  pgadmin-data:
    driver: local